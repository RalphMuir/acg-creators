<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACG Creators</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <!-- 左 -->
  <section class="left">

    <div class="viewer">
      <img id="mainImage">
    </div>

    <div class="info">
      <h1 id="name"></h1>

      <div id="tags" class="tags"></div>

      <p id="desc"></p>

      <div id="gallery" class="gallery"></div>

      <div class="buttons">
        <a id="link" target="_blank" class="btn primary">前往網站</a>
      </div>
    </div>

  </section>

  <!-- 右 -->
  <aside class="right">

    <h2>ACG Creators</h2>

    <!-- 🔍 搜尋 -->
    <input id="search" class="search" placeholder="搜尋創作者 / Tag..." />

    <!-- 🏷 Tag -->
    <div class="tag-filter">
      <button data-tag="all" class="active">全部</button>
      <button data-tag="插畫">插畫</button>
      <button data-tag="VTuber">VTuber</button>
    </div>

    <div id="creatorList" class="list"></div>

  </aside>

</main>

<script src="script.js"></script>
</body>
</html>
